services:
  # -------------------------------------
  # 1) The Backend API (Node.js)
  # -------------------------------------
  - type: web
    name: sharqiah-backend
    env: node
    plan: free
    rootDir: run-tracker-server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sharqiah-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # -------------------------------------
  # 2) The Frontend (Vite/React)
  # -------------------------------------
  - type: web
    name: sharqiah-frontend
    env: static
    rootDir: run-tracker
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sharqiah-backend.onrender.com

databases:
  # -------------------------------------
  # 3) Free Managed PostgreSQL Database
  # -------------------------------------
  - name: sharqiah-db
    plan: free
    databaseName: sharqiahteam
    user: sharqiah_admin
